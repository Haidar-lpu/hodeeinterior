<!DOCTYPE html>
<html>

<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#667eea,#764ba2);
}

/* LOGIN CARD */

.login-card{
background:white;
width:90%;
max-width:380px;
padding:35px;
border-radius:10px;
box-shadow:0 12px 25px rgba(0,0,0,0.2);
text-align:center;
}

.login-card h2{
margin-bottom:25px;
color:#333;
font-size:24px;
}

/* INPUT GROUP */

.input-group{
position:relative;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
transition:0.2s;
}

input:focus{
border-color:#007bff;
outline:none;
box-shadow:0 0 5px rgba(0,123,255,0.3);
}

/* EYE ICON */

.eye{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
font-size:18px;
color:#555;
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0056b3;
}

/* ERROR MESSAGE */

.error{
color:red;
font-size:13px;
margin-top:10px;
}

/* SMALL SCREEN IMPROVEMENTS */

@media(max-width:480px){

.login-card{
padding:25px;
}

.login-card h2{
font-size:20px;
}

}

</style>

</head>

<body>

<div class="login-card">

<h2>Admin Login</h2>

<form onsubmit="login(event)">

<input id="user" placeholder="Username" required>

<div class="input-group">

<input id="pass" type="password" placeholder="Password" required>

<span class="eye" onclick="togglePassword()">👁️</span>

</div>

<button type="submit">Login</button>

<div id="error" class="error"></div>

</form>

</div>

<script>

/* Redirect if already logged in */

if(localStorage.getItem("admin")==="true"){
window.location="dashboard.html";
}

/* LOGIN */

function login(e){

e.preventDefault();

const u=document.getElementById("user").value;
const p=document.getElementById("pass").value;

if(u==="admin" && p==="hodee#2026%10=6"){

localStorage.setItem("admin","true");

window.location="dashboard.html";

}else{

document.getElementById("error").innerText="Invalid username or password";

}

}

/* PASSWORD TOGGLE */

function togglePassword(){

const pass=document.getElementById("pass");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}

}

</script>

</body>
</html>
